# CI for the AppForge boilerplate.
#
# "Proof over claims" applies to the boilerplate itself: every push must prove
# that nothing project-specific leaked out of the source apps, that the
# scaffolder produces working projects, and that the templates stay coherent.
#
# Jobs:
#   leakage          — tracked files contain no strings from the source apps
#   scaffold-core    — unknown platform → universal core only, key files present
#   scaffold-swift   — swift-ios skeleton builds (DS + DataLayer) and tests (Core)
#   scaffold-vapor   — vapor-api skeleton builds and tests (in-memory SQLite)
#   scaffold-nuxt    — nuxt-web skeleton installs, builds and unit-tests
#   scaffold-ts-sdk  — ts-sdk skeleton typechecks, tests and builds (dist verified)
#   templates-sanity — placeholders limited to the supported set, manifests valid
#
# CONTRIBUTING.md requires a scaffold-<pack-id> job per shipped pack: README marks a
# pack ✅ only once its skeleton is proven here on the right runner.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  leakage:
    name: leakage (no project-specific strings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep tracked files for forbidden strings
        run: bash .github/scripts/leakage-check.sh

  scaffold-core:
    name: scaffold-core (unknown platform → core only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scaffold with a platform that has no pack
        # --yes auto-confirms "continue with the universal core only". The
        # identifier prompt still reads stdin, so feed it one newline to accept
        # its default — with stdin at EOF the CLI exits 0 WITHOUT scaffolding.
        run: echo "" | node bin/cli.js init TestCore --platform none-existent --yes
      - name: Assert core-only project layout
        run: |
          set -euo pipefail
          fail=0
          for f in \
            TestCore/CLAUDE.md \
            TestCore/docs-architecture/ARCHITECTURE_PRINCIPLES.md \
            TestCore/.claude/skills/kickoff/SKILL.md \
            TestCore/.claude/memory/PROJECT_STATE.md \
            TestCore/.mcp.json \
            TestCore/.gitignore
          do
            if [ ! -e "$f" ]; then
              echo "::error::missing $f"
              fail=1
            fi
          done
          if [ -d TestCore/Packages ]; then
            echo "::error::core-only scaffold must not contain a platform skeleton"
            fail=1
          fi
          if grep -rnIE --exclude-dir=.git '\{\{[A-Z][A-Z0-9_]*\}\}' TestCore; then
            echo "::error::unsubstituted placeholder in scaffolded project"
            fail=1
          fi
          if [ "$fail" -eq 0 ]; then
            echo "Core-only scaffold OK"
          fi
          exit "$fail"

  scaffold-swift:
    name: scaffold-swift (skeleton builds + tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Select newest Xcode (templates use swift-tools 6.2 → Xcode 26+)
        run: |
          LATEST="$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)"
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST"
          swift --version
      - name: Scaffold an iOS project
        run: node bin/cli.js init TestApp --platform swift-ios --id com.test.app --yes
      - name: Assert no unsubstituted placeholders
        run: |
          if grep -rnIE --exclude-dir=.git '\{\{[A-Z][A-Z0-9_]*\}\}' TestApp; then
            echo "::error::unsubstituted placeholder in scaffolded project"
            exit 1
          fi
          echo "Placeholders fully substituted"
      - name: Build the design-system package
        run: swift build --package-path TestApp/Packages/TestAppDS
      - name: Build the data-layer package
        run: swift build --package-path TestApp/Packages/DataLayer
      - name: Test the core package
        run: swift test --package-path TestApp/Packages/TestAppCore

  scaffold-vapor:
    name: scaffold-vapor (skeleton builds + tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Select newest Xcode (vapor pack needs a Swift 6 toolchain)
        run: |
          LATEST="$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)"
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST"
          swift --version
      - name: Scaffold a Vapor API project
        run: node bin/cli.js init TestApi --platform vapor-api --id com.test.api --yes
      - name: Assert no unsubstituted placeholders
        run: |
          if grep -rnIE --exclude-dir=.git '\{\{[A-Z][A-Z0-9_]*\}\}' TestApi; then
            echo "::error::unsubstituted placeholder in scaffolded project"
            exit 1
          fi
          echo "Placeholders fully substituted"
      - name: Build the app (resolves Vapor/Fluent and compiles)
        # No database needed: the test environment uses in-memory SQLite (see pack notes).
        run: swift build --package-path TestApi
      - name: Test the full stack (boot + contracts on in-memory SQLite)
        run: swift test --package-path TestApi

  scaffold-nuxt:
    name: scaffold-nuxt (skeleton installs + builds + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scaffold a Nuxt web project
        run: node bin/cli.js init TestWeb --platform nuxt-web --id com.test.web --yes
      - name: Assert no unsubstituted placeholders
        run: |
          if grep -rnIE --exclude-dir=.git '\{\{[A-Z][A-Z0-9_]*\}\}' TestWeb; then
            echo "::error::unsubstituted placeholder in scaffolded project"
            exit 1
          fi
          echo "Placeholders fully substituted"
      - name: Install deps
        # Skeleton ships no lockfile, so `npm install`; `postinstall` runs `nuxt prepare`.
        run: npm install --prefix TestWeb
      - name: Unit tests (vitest, no Nuxt boot)
        run: npm --prefix TestWeb run test
      - name: Production build (nuxt build → .output/)
        run: npm --prefix TestWeb run build

  scaffold-ts-sdk:
    name: scaffold-ts-sdk (skeleton typechecks + tests + builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scaffold a TypeScript SDK project
        # --id becomes the npm package name; an @scope/name is a valid npm-style id.
        run: node bin/cli.js init TestSdk --platform ts-sdk --id "@test/sdk" --yes
      - name: Assert no unsubstituted placeholders
        run: |
          if grep -rnIE --exclude-dir=.git '\{\{[A-Z][A-Z0-9_]*\}\}' TestSdk; then
            echo "::error::unsubstituted placeholder in scaffolded project"
            exit 1
          fi
          echo "Placeholders fully substituted"
      - name: Install deps
        run: npm install --prefix TestSdk
      - name: Typecheck (tsc --noEmit — fastest signal)
        run: npm --prefix TestSdk run typecheck
      - name: Unit tests (the "test" script is `vitest run`)
        run: npm --prefix TestSdk run test
      - name: Build + dist verification (tsup → verify-dist.mjs)
        run: npm --prefix TestSdk run build

  templates-sanity:
    name: templates-sanity (placeholders + pack manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check placeholders and pack.json manifests
        run: bash .github/scripts/templates-sanity.sh
